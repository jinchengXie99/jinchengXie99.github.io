********************************/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdlib.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;time.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;string.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">Vector</span>&#123;</span><br><span class="line">	<span class="type">int</span> *data;</span><br><span class="line">	<span class="type">int</span> size,length;</span><br><span class="line">&#125;Vector;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 初始化</span></span><br><span class="line"><span class="function">Vector *<span class="title">init</span><span class="params">(<span class="type">int</span> n)</span></span>&#123;  </span><br><span class="line"></span><br><span class="line">	Vector *vec = (Vector*)<span class="built_in">malloc</span>(<span class="built_in">sizeof</span> (Vector));</span><br><span class="line">	vec-&gt;data = (<span class="type">int</span> *)<span class="built_in">malloc</span>(<span class="built_in">sizeof</span>(<span class="type">int</span>)*n);</span><br><span class="line">	vec-&gt;size = n;</span><br><span class="line">	vec-&gt;length = <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">return</span> vec;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 删除元素</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">clear</span> <span class="params">(Vector* vec)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">if</span> (vec == <span class="literal">NULL</span>)<span class="keyword">return</span> ;</span><br><span class="line">	<span class="built_in">free</span>(vec-&gt;data);</span><br><span class="line">	<span class="built_in">free</span>(vec);</span><br><span class="line">	<span class="keyword">return</span> ;	</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 插入元素</span></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">insert</span><span class="params">(Vector* vec,<span class="type">int</span> ind,<span class="type">int</span> val)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">if</span> (vec == <span class="literal">NULL</span>) <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span> (vec-&gt;length == vec-&gt;size)<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span> (ind &lt; <span class="number">0</span> || ind &gt; vec-&gt;length)<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">for</span> (<span class="type">int</span> i = vec-&gt;length;i &gt; ind; i--)</span><br><span class="line">	&#123;</span><br><span class="line">		vec-&gt;data[i] = vec-&gt;data[i<span class="number">-1</span>];</span><br><span class="line">		</span><br><span class="line">	&#125;</span><br><span class="line">	vec-&gt; data[ind] = val;</span><br><span class="line">	vec-&gt; length += <span class="number">1</span>;</span><br><span class="line">	<span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 删除指定容器第几个元素</span></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">erase</span><span class="params">(Vector *vec,<span class="type">int</span> ind)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">if</span> (vec == <span class="literal">NULL</span>)<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span> (vec -&gt;length == <span class="number">0</span>)<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span> (ind &lt; <span class="number">0</span> || ind &gt;= vec-&gt;length )<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	<span class="keyword">for</span> (<span class="type">int</span> i = ind + <span class="number">1</span>;i &lt; vec -&gt; length ; i++ )</span><br><span class="line">	&#123;</span><br><span class="line">		vec-&gt;data[i<span class="number">-1</span>] = vec -&gt;data[i];</span><br><span class="line">	&#125;</span><br><span class="line">	vec-&gt;length-=<span class="number">1</span>;</span><br><span class="line">	<span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 打印容器所有元素</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">output</span><span class="params">(Vector* vec )</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="built_in">printf</span> (<span class="string">&quot;Vector (%d) = [&quot;</span>,vec -&gt; length);</span><br><span class="line">	<span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; vec -&gt; length ; i++ )</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">if</span> (i != <span class="number">0</span> )<span class="built_in">printf</span>(<span class="string">&quot;,&quot;</span>);</span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">&quot;%d&quot;</span>,vec-&gt;data[i]);</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">printf</span> (<span class="string">&quot;]\n&quot;</span>);</span><br><span class="line">	<span class="keyword">return</span> ;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span> <span class="params">()</span></span>&#123;</span><br><span class="line">	<span class="built_in">srand</span>(<span class="built_in">time</span>(<span class="number">0</span>));</span><br><span class="line">	<span class="meta">#<span class="keyword">define</span> Max_op 20</span></span><br><span class="line">	<span class="type">int</span> op,ind,val;</span><br><span class="line">	Vector *vec = <span class="built_in">init</span>(Max_op);</span><br><span class="line">	<span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; Max_op; i++) <span class="comment">// 测试</span></span><br><span class="line">	&#123;</span><br><span class="line">		op = <span class="built_in">rand</span>() % <span class="number">2</span>;</span><br><span class="line">		ind = <span class="built_in">rand</span>() % (vec-&gt;length + <span class="number">1</span>);</span><br><span class="line">		val = <span class="built_in">rand</span>() % <span class="number">100</span>;</span><br><span class="line">		<span class="keyword">switch</span> (op)</span><br><span class="line">		&#123;</span><br><span class="line">			<span class="keyword">case</span> <span class="number">0</span>:&#123;</span><br><span class="line">					   <span class="built_in">printf</span>(<span class="string">&quot;insert %d at %d to vector\n&quot;</span>,val,ind);</span><br><span class="line">					   <span class="built_in">insert</span> (vec, ind, val);</span><br><span class="line">				   &#125;<span class="keyword">break</span>;</span><br><span class="line">			<span class="keyword">case</span> <span class="number">1</span>:&#123;</span><br><span class="line">					<span class="built_in">printf</span> (<span class="string">&quot;erase itme at %d from vector\n&quot;</span>, ind);</span><br><span class="line">					<span class="built_in">erase</span>(vec, ind);</span><br><span class="line">				   &#125;<span class="keyword">break</span>;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="built_in">output</span> (vec);</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
